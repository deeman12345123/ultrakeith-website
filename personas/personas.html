<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kool Keith Personas - Trading Cards</title>

    <!-- Favicon - RELATIVE PATHS -->
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">

    <!-- Shared CSS -->
    <link rel="stylesheet" href="../shared/styles.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --mystical-blue: #00BFFF;
            --energy-purple: #8A2BE2;
            --plasma-pink: #FF1493;
        }

        .personas-header {
            text-align: center;
            margin-bottom: 30px;
            padding: var(--space-lg) 0;
        }

        .personas-main-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            color: var(--keith-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(218, 181, 71, 0.6);
        }

        .personas-subtitle {
            font-size: 1.2rem;
            color: var(--keith-white-75);
            margin-bottom: 20px;
        }

        /* DECK CONTAINER */
        .deck-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            margin: 40px 0;
            position: relative;
        }

        .deck-container.hidden {
            display: none;
        }

        /* DECK BOX */
        .deck-box {
            width: 300px;
            height: 450px;
            background: linear-gradient(145deg, #1a1a1a 0%, #000000 100%);
            border: 1px solid var(--keith-gold);
            border-radius: var(--radius-xl);
            cursor: pointer;
            position: relative;
            transition: all var(--transition);
        }

        .deck-box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(218, 181, 71, 0.5);
        }

        .deck-box.mystical-hover {
            animation: mystical-pulse 2s ease-in-out infinite;
        }

        @keyframes mystical-pulse {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(0, 191, 255, 0.4));
                transform: scale(1.05);
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(138, 43, 226, 0.7));
                transform: scale(1.08);
            }
        }

        .deck-box.cracking {
            animation: deck-shake 0.8s ease-in-out infinite;
        }

        @keyframes deck-shake {
            0%, 100% { transform: translateX(0) scale(1.05); }
            25% { transform: translateX(-2px) scale(1.06); }
            75% { transform: translateX(2px) scale(1.04); }
        }

        /* DECK CONTENT */
        .deck-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--keith-gold);
            font-family: 'Orbitron', monospace;
        }

        .deck-logo {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            background: transparent;
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .deck-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0.9);
        }

        .deck-box.energy-building .deck-logo {
            animation: logo-energy 1s ease-in-out infinite alternate;
        }

        @keyframes logo-energy {
            0% {
                filter: brightness(1.2) drop-shadow(0 0 15px var(--mystical-blue));
                transform: scale(1);
            }
            100% {
                filter: brightness(2) drop-shadow(0 0 25px var(--energy-purple));
                transform: scale(1.05);
            }
        }

        /* CLICK HINT */
        .click-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            animation: mystical-pulse-text 2s infinite;
            text-align: center;
            white-space: nowrap;
            color: var(--keith-gold);
            font-family: 'Orbitron', monospace;
        }

        @keyframes mystical-pulse-text {
            0%, 100% {
                opacity: 0.6;
                text-shadow: 0 0 8px currentColor;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px currentColor, 0 0 30px var(--mystical-blue);
                transform: translateX(-50%) scale(1.02);
            }
        }

        /* PARTICLES */
        .mystical-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--mystical-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
            opacity: 0;
            box-shadow: 0 0 6px currentColor;
        }

        .energy-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border: 3px solid var(--energy-purple);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }

        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle,
                rgba(255, 255, 255, 0.9) 0%,
                rgba(0, 191, 255, 0.6) 30%,
                rgba(138, 43, 226, 0.3) 60%,
                transparent 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .card-burst {
            position: absolute;
            width: 20px;
            height: 30px;
            background: linear-gradient(145deg, var(--keith-gold), var(--keith-gold-light));
            border-radius: 3px;
            opacity: 0;
            pointer-events: none;
            z-index: 1002;
            box-shadow: 0 0 8px var(--keith-gold);
        }

        @keyframes particle-burst {
            0% {
                opacity: 1;
                transform: scale(0) rotate(0deg);
            }
            20% {
                opacity: 1;
                transform: scale(1.5) rotate(90deg);
            }
            80% {
                opacity: 0.8;
                transform: scale(1) rotate(270deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(360deg);
            }
        }

        @keyframes energy-wave-expand {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                width: 600px;
                height: 600px;
                opacity: 0;
            }
        }

        @keyframes screen-flash-effect {
            0% { opacity: 0; }
            15% { opacity: 1; }
            35% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* CONTROLS (sort + counter) */
        .controls-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .controls-section.show {
            display: flex;
        }

        .sort-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sort-btn {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            padding: 10px 25px;
            border: 2px solid var(--keith-gold);
            background: linear-gradient(145deg, #1a1a1a 0%, #000000 100%);
            color: var(--keith-gold);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .sort-btn:hover {
            box-shadow: 0 0 15px rgba(218, 181, 71, 0.5);
            transform: translateY(-2px);
        }

        .sort-btn.active {
            background: linear-gradient(145deg, var(--keith-gold) 0%, var(--keith-gold-light) 100%);
            color: var(--keith-black);
        }

        .persona-counter {
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            color: var(--keith-white-75);
            letter-spacing: 1px;
        }

        /* CARDS */
        .cards-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .cards-container.show {
            display: block;
        }

        .cards-grid {
            display: grid;
            gap: 30px;
            justify-content: center;
            padding: 20px 0;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
                max-width: 320px;
                margin: 0 auto;
            }
        }

        @media (min-width: 769px) and (max-width: 1200px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1201px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .trading-card {
            width: 300px;
            height: 450px;
            perspective: 1000px;
            cursor: pointer;
            justify-self: center;
            opacity: 0;
            transform: scale(0.1);
            transition: all var(--transition);
        }

        /* Mobile: Only first card animates (saves performance) */
        @media (max-width: 768px) {
            .trading-card:not(:first-child).card-flying {
                animation: card-scale-only 0.8s ease-out both;
            }

            .trading-card:first-child.card-flying {
                animation:
                    card-scale 1.2s ease-out both,
                    card-smooth-spin 1.2s linear both;
                transform-origin: center center;
            }
        }

        /* Desktop: All cards animate but with consistent timing */
        @media (min-width: 769px) {
            .trading-card.card-flying {
                animation:
                    card-scale 1.2s ease-out both,
                    card-smooth-spin 1.2s linear both;
                transform-origin: center center;
                will-change: transform;
            }
        }

        @keyframes card-scale-only {
            0% {
                opacity: 1;
                transform: scale(0.1);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes card-scale {
            0% {
                opacity: 1;
                transform: scale(0.1);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes card-smooth-spin {
            0% {
                transform: rotateZ(0turn);
            }
            100% {
                transform: rotateZ(1turn);
            }
        }

        .trading-card.card-landed {
            opacity: 1;
            transform: scale(1) rotateZ(0deg);
            animation: none;
        }

        .trading-card.card-flying .card-inner {
            animation: none;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s ease;
            transform-style: preserve-3d;
        }

        .trading-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--radius-xl);
            border: 1px solid var(--keith-gold);
            background: linear-gradient(145deg, #1a1a1a 0%, #000000 100%);
            box-shadow: var(--shadow-lg);
        }

        .card-front {
            transform: rotateY(0deg);
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .card-front::before, .card-back::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid var(--keith-white-75);
            border-radius: 6px;
            opacity: 0.8;
        }

        .front-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 60px;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background: linear-gradient(145deg, #0F0505 0%, #1a1a1a 100%);
            border: 1px solid var(--keith-gold);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .persona-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--keith-gold);
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
        }

        .persona-title.long-title {
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            line-height: 0.95;
        }

        .image-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
            border: 1px solid var(--keith-white-75);
            border-radius: 8px;
            background: #0F0505;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--keith-white-75);
            font-size: 0.8rem;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats-section {
            flex: 1;
            margin-bottom: 10px;
        }

        .stat-item {
            display: flex;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .stat-label {
            font-weight: 700;
            color: var(--keith-white-75);
            width: 70px;
            flex-shrink: 0;
        }

        .stat-value {
            color: var(--keith-white);
            flex: 1;
        }

        .quote-section {
            padding: 10px;
            border-top: 1px solid var(--keith-white-75);
            font-style: italic;
            color: var(--keith-white-75);
            font-size: 0.8rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
        }

        .back-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 110px;
            display: flex;
            flex-direction: column;
        }

        .back-title {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 900;
            color: var(--keith-gold);
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
        }

        .back-title.long-title {
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            line-height: 0.95;
        }

        .info-section {
            margin-bottom: 15px;
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--keith-white-75);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .section-content {
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--keith-white-75);
        }

        .logo-space {
            position: absolute;
            bottom: 25px;
            left: 15px;
            right: 15px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-logo {
            width: 180px;
            height: auto;
            opacity: 0.8;
            max-height: 100px;
            object-fit: contain;
        }

        .mc-logo {
            position: absolute;
            bottom: 15px;
            right: 10px;
            width: 40px;
            height: 40px;
            z-index: 20;
        }

        .mc-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-number {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--keith-white-75);
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--keith-white-75);
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--keith-white-55);
            font-family: 'Orbitron', monospace;
        }

        /* PAGINATION */
        .pagination-container {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 50px 0 30px 0;
            flex-wrap: wrap;
        }

        .pagination-container.show {
            display: flex;
        }

        .page-btn {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            padding: 15px 40px;
            border: 2px solid var(--keith-gold);
            background: linear-gradient(145deg, #1a1a1a 0%, #000000 100%);
            color: var(--keith-gold);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition);
            text-transform: uppercase;
            font-size: 1rem;
        }

        .page-btn:hover:not(:disabled) {
            background: linear-gradient(145deg, var(--keith-gold) 0%, var(--keith-gold-light) 100%);
            color: var(--keith-black);
            transform: translateY(-2px);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-indicator {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            color: var(--keith-white-75);
            letter-spacing: 1px;
        }

        .data-error {
            text-align: center;
            color: var(--plasma-pink);
            font-family: 'Orbitron', monospace;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <!-- Navigation and banner inserted automatically by shared/navigation.js -->

    <main class="main">
        <div class="personas-header">
            <h1 class="personas-main-title">Personas</h1>
            <p class="personas-subtitle">Official Collection</p>
        </div>

        <div class="deck-container" id="deckContainer">
            <div class="deck-box" id="deckBox">
                <!-- DECK CONTENT -->
                <div class="deck-content">
                    <div class="deck-logo">
                        <img src="logoback.png" alt="Ultra Keith Logo" onerror="this.style.display='none'">
                    </div>
                </div>

                <!-- CLICK HINT -->
                <div class="click-hint">Click to Open the Deck</div>
            </div>
        </div>

        <!-- CONTROLS (hidden until deck opens) -->
        <div class="controls-section" id="controlsSection">
            <div class="sort-buttons">
                <button class="sort-btn active" id="sortOldest">Oldest First</button>
                <button class="sort-btn" id="sortNewest">Newest First</button>
            </div>
            <div class="persona-counter" id="personaCounter"></div>
        </div>

        <div class="cards-container" id="cardsContainer">
            <div class="cards-grid" id="cardsGrid">
            </div>
        </div>

        <!-- PAGINATION (hidden until deck opens) -->
        <div class="pagination-container" id="paginationContainer">
            <button class="page-btn" id="prevPageBtn">← Previous</button>
            <span class="page-indicator" id="pageIndicator"></span>
            <button class="page-btn" id="nextPageBtn">Next →</button>
        </div>
    </main>

    <!-- Footer inserted automatically by shared/navigation.js -->

    <!-- Shared Navigation System -->
    <script src="../shared/navigation.js"></script>

    <!-- Personas database - MUST load before the system below -->
    <script src="personas-data.js"></script>

    <!-- Personas system -->
    <script>
        console.log('🚀 Starting Ultra Keith Personas...');

        // Configuration
        var CONFIG = {
            ANIMATION_SPEEDS: {
                PORTAL_PHASES: [0, 600, 1200, 1600, 2200, 3000],
                CARD_FLIGHT: 1200,
                CARD_LAUNCH_INTERVAL: 100,
                PARTICLE_BURST: 2000,
                ENERGY_WAVE: 1500,
                SCREEN_FLASH: 2000
            },
            CARD_LIMITS: {
                LONG_TITLE_THRESHOLD: 20,
                CARDS_PER_PAGE: 12
            },
            PARTICLE_COUNTS: {
                MYSTICAL_PARTICLES: 60,
                ENERGY_WAVES: 6,
                CARD_BURSTS: 40
            },
            IMAGES: {
                DECK_LOGO: 'logoback.png',
                MC_LOGO: 'mc.png',
                BACK_LOGO: 'logoback.png',
                CARD_PLACEHOLDER: 'IMG'
            },
            COLORS: {
                PARTICLE_COLORS: ['var(--mystical-blue)', 'var(--energy-purple)', 'var(--plasma-pink)', 'var(--keith-gold)']
            },
            FEATURES: {
                HOVER_EFFECTS: true,
                CARD_ROTATION: true,
                SCREEN_FLASH: true,
                CONSOLE_LOGGING: true
            }
        };

        // State
        var deckOpened = false;
        var currentPage = 1;
        var sortOrder = 'oldest'; // 'oldest' or 'newest'
        var allPersonas = [];

        // Utility functions
        function safeRemoveElement(element) {
            if (element && element.parentNode) {
                element.parentNode.removeChild(element);
            }
        }

        function addClassSafely(element, className) {
            if (element && element.classList) {
                element.classList.add(className);
            }
        }

        function removeClassSafely(element, className) {
            if (element && element.classList) {
                element.classList.remove(className);
            }
        }

        function logSafely(message) {
            if (CONFIG.FEATURES.CONSOLE_LOGGING && console && console.log) {
                console.log(message);
            }
        }

        // Load and sort the database
        function getSortedPersonas() {
            var personas = allPersonas.slice(); // copy
            personas.sort(function(a, b) {
                var numA = parseInt(a.number, 10);
                var numB = parseInt(b.number, 10);
                return sortOrder === 'oldest' ? numA - numB : numB - numA;
            });
            return personas;
        }

        function getTotalPages() {
            return Math.max(1, Math.ceil(allPersonas.length / CONFIG.CARD_LIMITS.CARDS_PER_PAGE));
        }

        function getCurrentPagePersonas() {
            var sorted = getSortedPersonas();
            var start = (currentPage - 1) * CONFIG.CARD_LIMITS.CARDS_PER_PAGE;
            return sorted.slice(start, start + CONFIG.CARD_LIMITS.CARDS_PER_PAGE);
        }

        // Build card HTML
        function buildCardHTML(persona, isLongTitle) {
            var imageHTML = persona.image
                ? '<img src="' + persona.image + '" alt="' + persona.name + '" onerror="this.parentNode.textContent=\'' + CONFIG.IMAGES.CARD_PLACEHOLDER + '\'">'
                : CONFIG.IMAGES.CARD_PLACEHOLDER;

            return '<div class="card-inner">' +
                '<div class="card-front">' +
                    '<div class="front-container">' +
                        '<div class="card-header">' +
                            '<h1 class="persona-title ' + (isLongTitle ? 'long-title' : '') + '">' + persona.name + '</h1>' +
                        '</div>' +
                        '<div class="image-container">' + imageHTML + '</div>' +
                        '<div class="stats-section">' +
                            '<div class="stat-item">' +
                                '<span class="stat-label">Age:</span>' +
                                '<span class="stat-value">' + persona.age + '</span>' +
                            '</div>' +
                            '<div class="stat-item">' +
                                '<span class="stat-label">Origin:</span>' +
                                '<span class="stat-value">' + persona.origin + '</span>' +
                            '</div>' +
                            '<div class="stat-item">' +
                                '<span class="stat-label">Likes:</span>' +
                                '<span class="stat-value">' + persona.likes + '</span>' +
                            '</div>' +
                            '<div class="stat-item">' +
                                '<span class="stat-label">Dislikes:</span>' +
                                '<span class="stat-value">' + persona.dislikes + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="quote-section">"' + persona.quote + '"</div>' +
                    '</div>' +
                    '<div class="mc-logo">' +
                        '<img src="' + CONFIG.IMAGES.MC_LOGO + '" alt="MC" class="mc-logo-img" onerror="this.style.display=\'none\'">' +
                    '</div>' +
                    '<div class="flip-hint">Click to flip</div>' +
                    '<div class="card-number">#' + persona.number + '</div>' +
                '</div>' +
                '<div class="card-back">' +
                    '<div class="back-container">' +
                        '<h2 class="back-title ' + (isLongTitle ? 'long-title' : '') + '">' + persona.name + ' (' + persona.year + ')</h2>' +
                        '<div class="info-section">' +
                            '<h3 class="section-title">Biography</h3>' +
                            '<div class="section-content">' + persona.biography + '</div>' +
                        '</div>' +
                        '<div class="info-section">' +
                            '<h3 class="section-title">Debut</h3>' +
                            '<div class="section-content">' + persona.debut + '</div>' +
                        '</div>' +
                        '<div class="info-section">' +
                            '<h3 class="section-title">Key Themes</h3>' +
                            '<div class="section-content">' + persona.themes + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="logo-space">' +
                        '<img src="' + CONFIG.IMAGES.BACK_LOGO + '" alt="Ultra Keith Logo" class="back-logo" onerror="this.style.display=\'none\'">' +
                    '</div>' +
                    '<div class="mc-logo">' +
                        '<img src="' + CONFIG.IMAGES.MC_LOGO + '" alt="MC" class="mc-logo-img" onerror="this.style.display=\'none\'">' +
                    '</div>' +
                    '<div class="card-number">#' + persona.number + '</div>' +
                '</div>' +
            '</div>';
        }

        // Generate cards for the current page
        function generateCards(animate) {
            logSafely('📋 Generating cards for page ' + currentPage + '...');
            var container = document.getElementById('cardsGrid');
            if (!container) return;

            // Clear existing cards
            container.innerHTML = '';

            var pagePersonas = getCurrentPagePersonas();

            for (var i = 0; i < pagePersonas.length; i++) {
                var persona = pagePersonas[i];
                var isLongTitle = persona.name.length > CONFIG.CARD_LIMITS.LONG_TITLE_THRESHOLD || persona.name === "X-Caliber";
                var card = document.createElement('div');

                card.className = 'trading-card';
                card.innerHTML = buildCardHTML(persona, isLongTitle);

                // Add flip functionality
                card.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                });

                container.appendChild(card);
            }

            logSafely('✅ Generated ' + pagePersonas.length + ' cards');

            updatePaginationUI();

            if (animate) {
                animateCardsFromDeck();
            }
        }

        // Update pagination buttons and page indicator
        function updatePaginationUI() {
            var totalPages = getTotalPages();
            var pageIndicator = document.getElementById('pageIndicator');
            var prevBtn = document.getElementById('prevPageBtn');
            var nextBtn = document.getElementById('nextPageBtn');
            var counter = document.getElementById('personaCounter');

            if (pageIndicator) {
                pageIndicator.textContent = 'Page ' + currentPage + ' of ' + totalPages;
            }
            if (prevBtn) {
                prevBtn.disabled = (currentPage <= 1);
            }
            if (nextBtn) {
                nextBtn.disabled = (currentPage >= totalPages);
            }
            if (counter) {
                counter.textContent = allPersonas.length + ' Personas in the Collection';
            }
        }

        // Animation functions
        function createMysticalParticles(container, count) {
            if (!container) return;
            count = count || CONFIG.PARTICLE_COUNTS.MYSTICAL_PARTICLES;

            for (var i = 0; i < count; i++) {
                setTimeout(function(index) {
                    return function() {
                        var particle = document.createElement('div');
                        particle.className = 'mystical-particle';

                        var centerX = container.offsetWidth / 2;
                        var centerY = container.offsetHeight / 2;
                        var angle = (Math.PI * 2 * index) / count;
                        var radius = 30 + Math.random() * 100;

                        particle.style.left = (centerX + Math.cos(angle) * radius) + 'px';
                        particle.style.top = (centerY + Math.sin(angle) * radius) + 'px';

                        var colors = CONFIG.COLORS.PARTICLE_COLORS;
                        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                        particle.style.animation = 'particle-burst 2s ease-out forwards';

                        container.appendChild(particle);

                        setTimeout(function() {
                            safeRemoveElement(particle);
                        }, CONFIG.ANIMATION_SPEEDS.PARTICLE_BURST);
                    };
                }(i), i * 30);
            }
        }

        function createEnergyWaves(container, count) {
            if (!container) return;
            count = count || CONFIG.PARTICLE_COUNTS.ENERGY_WAVES;

            for (var i = 0; i < count; i++) {
                setTimeout(function() {
                    var wave = document.createElement('div');
                    wave.className = 'energy-wave';
                    wave.style.animation = 'energy-wave-expand 1.5s ease-out forwards';
                    container.appendChild(wave);

                    setTimeout(function() {
                        safeRemoveElement(wave);
                    }, CONFIG.ANIMATION_SPEEDS.ENERGY_WAVE);
                }, i * 200);
            }
        }

        function createScreenFlash() {
            if (!CONFIG.FEATURES.SCREEN_FLASH) return;

            var flash = document.createElement('div');
            flash.className = 'screen-flash';
            flash.style.animation = 'screen-flash-effect ' + (CONFIG.ANIMATION_SPEEDS.SCREEN_FLASH / 1000) + 's ease-out forwards';
            document.body.appendChild(flash);

            setTimeout(function() {
                safeRemoveElement(flash);
            }, CONFIG.ANIMATION_SPEEDS.SCREEN_FLASH);
        }

        function createCardBurst(container, count) {
            if (!container) return;
            count = count || CONFIG.PARTICLE_COUNTS.CARD_BURSTS;

            for (var i = 0; i < count; i++) {
                setTimeout(function() {
                    var cardBurst = document.createElement('div');
                    cardBurst.className = 'card-burst';

                    var centerX = container.offsetWidth / 2;
                    var centerY = container.offsetHeight / 2;
                    cardBurst.style.left = (centerX + (Math.random() - 0.5) * 200) + 'px';
                    cardBurst.style.top = (centerY + (Math.random() - 0.5) * 200) + 'px';

                    var moveX = (Math.random() - 0.5) * 400;
                    var moveY = (Math.random() - 0.5) * 400;
                    cardBurst.style.transform = 'translate(' + moveX + 'px, ' + moveY + 'px) rotate(' + (Math.random() * 360) + 'deg)';
                    cardBurst.style.animation = 'particle-burst 2.5s ease-out forwards';

                    container.appendChild(cardBurst);

                    setTimeout(function() {
                        safeRemoveElement(cardBurst);
                    }, 2500);
                }, i * 50);
            }
        }

        // Card flight animation - runs on deck open AND every page/sort change
        function animateCardsFromDeck() {
            var cards = document.querySelectorAll('.trading-card');

            for (var i = 0; i < cards.length; i++) {
                setTimeout(function(index, cardElement) {
                    return function() {
                        addClassSafely(cardElement, 'card-flying');

                        setTimeout(function() {
                            removeClassSafely(cardElement, 'card-flying');
                            addClassSafely(cardElement, 'card-landed');
                        }, CONFIG.ANIMATION_SPEEDS.CARD_FLIGHT);
                    };
                }(i, cards[i]), i * CONFIG.ANIMATION_SPEEDS.CARD_LAUNCH_INTERVAL);
            }
        }

        // Sort and pagination controls
        function setupControls() {
            var sortOldest = document.getElementById('sortOldest');
            var sortNewest = document.getElementById('sortNewest');
            var prevBtn = document.getElementById('prevPageBtn');
            var nextBtn = document.getElementById('nextPageBtn');

            if (sortOldest) {
                sortOldest.addEventListener('click', function() {
                    if (sortOrder !== 'oldest') {
                        sortOrder = 'oldest';
                        currentPage = 1;
                        addClassSafely(sortOldest, 'active');
                        removeClassSafely(sortNewest, 'active');
                        generateCards(true);
                    }
                });
            }

            if (sortNewest) {
                sortNewest.addEventListener('click', function() {
                    if (sortOrder !== 'newest') {
                        sortOrder = 'newest';
                        currentPage = 1;
                        addClassSafely(sortNewest, 'active');
                        removeClassSafely(sortOldest, 'active');
                        generateCards(true);
                    }
                });
            }

            if (prevBtn) {
                prevBtn.addEventListener('click', function() {
                    if (currentPage > 1) {
                        currentPage--;
                        generateCards(true);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', function() {
                    if (currentPage < getTotalPages()) {
                        currentPage++;
                        generateCards(true);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            }
        }

        // Main deck setup
        function setupDeck() {
            var deckBox = document.getElementById('deckBox');
            var deckContainer = document.getElementById('deckContainer');
            var cardsContainer = document.getElementById('cardsContainer');
            var controlsSection = document.getElementById('controlsSection');
            var paginationContainer = document.getElementById('paginationContainer');

            if (!deckBox) {
                console.error('❌ Deck box not found!');
                return;
            }

            deckBox.addEventListener('mouseenter', function() {
                if (!deckOpened && CONFIG.FEATURES.HOVER_EFFECTS) {
                    addClassSafely(deckBox, 'mystical-hover');
                }
            });

            deckBox.addEventListener('mouseleave', function() {
                removeClassSafely(deckBox, 'mystical-hover');
            });

            deckBox.addEventListener('click', function() {
                if (!deckOpened) {
                    logSafely('🎭 MYSTICAL PORTAL OPENING SEQUENCE INITIATED...');
                    deckOpened = true;

                    removeClassSafely(deckBox, 'mystical-hover');
                    addClassSafely(deckBox, 'energy-building');

                    setTimeout(function() {
                        createEnergyWaves(deckContainer);
                    }, CONFIG.ANIMATION_SPEEDS.PORTAL_PHASES[1]);

                    setTimeout(function() {
                        createMysticalParticles(deckContainer);
                    }, CONFIG.ANIMATION_SPEEDS.PORTAL_PHASES[2]);

                    setTimeout(function() {
                        createCardBurst(deckContainer);
                    }, CONFIG.ANIMATION_SPEEDS.PORTAL_PHASES[3]);

                    setTimeout(function() {
                        createScreenFlash();
                    }, CONFIG.ANIMATION_SPEEDS.PORTAL_PHASES[4]);

                    setTimeout(function() {
                        addClassSafely(deckContainer, 'hidden');
                        addClassSafely(cardsContainer, 'show');
                        addClassSafely(controlsSection, 'show');
                        addClassSafely(paginationContainer, 'show');

                        setTimeout(function() {
                            animateCardsFromDeck();
                        }, 200);
                    }, CONFIG.ANIMATION_SPEEDS.PORTAL_PHASES[5]);
                }
            });
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎬 Page loaded - initializing personas system...');

            try {
                // Load the database from personas-data.js
                if (typeof PERSONAS_DATABASE !== 'undefined' && PERSONAS_DATABASE.length > 0) {
                    allPersonas = PERSONAS_DATABASE;
                    console.log('🎉 ALL ' + allPersonas.length + ' PERSONAS LOADED!');
                } else {
                    console.error('❌ PERSONAS_DATABASE not found! Check that personas-data.js is in the personas folder.');
                    var grid = document.getElementById('cardsGrid');
                    if (grid) {
                        grid.innerHTML = '<div class="data-error">Persona database could not load. Check personas-data.js.</div>';
                    }
                    return;
                }

                generateCards(false);
                setupControls();
                setupDeck();
                console.log('🎉 Ready! ' + getTotalPages() + ' pages of personas. Click the mystical deck to open the portal!');
            } catch (error) {
                console.error('❌ Initialization failed:', error);
            }
        });
    </script>
</body>
</html>
